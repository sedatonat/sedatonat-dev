<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sedat Onat — Gelişimin sürekliliği.">
<meta name="author" content="Sedat Onat">
<meta property="og:title" content="Sedat Onat">
<meta property="og:description" content="Gelişimin sürekliliği.">
<meta property="og:url" content="https://sedatonat.dev">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Sedat Onat">
<meta name="theme-color" content="#000000">
<title>Sedat Onat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&family=Inter:wght@200;300;500;700;900&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&family=Inter:wght@200;300;500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&family=Inter:wght@200;300;500;700;900&display=swap" rel="stylesheet"></noscript>
<style>
  :root {
    --bg: #0a0a0c;
    --fg: #f0f0f0;
    --fg-2: #b0b0b0;
    --fg-3: #777;
    --line: rgba(255,255,255,0.18);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--fg);
    font-weight: 300; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  ::selection { background: var(--fg); color: var(--bg); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; background: transparent; border: 0; color: inherit; }

  .stage {
    position: relative;
    height: 100vh;
    overflow: hidden;
  }
  .bg-atmos {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% 55%, rgba(80,80,90,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(50,50,60,0.45) 0%, transparent 55%),
      radial-gradient(ellipse 60% 40% at 85% 70%, rgba(60,60,70,0.35) 0%, transparent 60%),
      linear-gradient(180deg, #0e0e12 0%, #050507 70%, #020203 100%);
  }
  .bg-mist {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.04) 0%, transparent 35%),
      radial-gradient(circle at 70% 30%, rgba(255,255,255,0.03) 0%, transparent 30%),
      radial-gradient(circle at 50% 90%, rgba(255,255,255,0.05) 0%, transparent 40%);
    filter: blur(40px);
  }
  .bg-grain {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 110px 110px;
    mask-image: radial-gradient(ellipse 70% 60% at center, black 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at center, black 0%, transparent 80%);
    pointer-events: none;
  }

  .nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 32px 56px;
  }
  .nav .brand {
    font-family: 'Bruno Ace SC', sans-serif;
    font-size: 16px;
    letter-spacing: 0.18em;
    color: var(--fg);
  }
  .nav .right {
    display: flex; gap: 28px; align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 300;
    color: var(--fg-2);
  }
  .nav .right a, .nav .right button { transition: color .2s; }
  .nav .right a:hover, .nav .right button:hover { color: var(--fg); }
  .nav .menu-bullet::before { content: "• "; color: var(--fg); margin-right: 2px; }

  .center {
    position: relative; z-index: 5;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 56px;
  }

  .title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(64px, 11vw, 168px);
    line-height: 0.96;
    letter-spacing: -0.045em;
    color: var(--fg);
    text-align: center;
    margin: 0;
  }

  .cta {
    margin-top: 60px;
    display: inline-flex; align-items: center; gap: 14px;
    border: 1px solid var(--line);
    padding: 18px 40px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--fg);
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(8px);
    transition: all .35s ease;
  }
  .cta:hover {
    background: var(--fg); color: #000; border-color: var(--fg);
    padding-right: 44px;
  }
  .cta .arr { transition: transform .25s; }
  .cta:hover .arr { transform: translateX(4px); }

  .fade { opacity: 0; transform: translateY(14px); animation: fade-up 1.2s cubic-bezier(.2,.7,.3,1) forwards; }
  .fade-1 { animation-delay: .15s; }
  .fade-2 { animation-delay: .35s; }
  .fade-3 { animation-delay: .55s; }
  @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 900px) {
    .nav { padding: 22px 28px; }
    .center { padding: 0 28px; }
  }
  @media (max-width: 480px) {
    .nav { padding: 18px 20px; }
    .nav .brand { font-size: 14px; }
    .nav .right { gap: 18px; font-size: 12px; }
    .center { padding: 0 20px; }
    .title { font-size: 56px; }
    .cta { margin-top: 44px; padding: 16px 30px; font-size: 12px; }
  }
</style>
</head>
<body>

<main class="stage">
  <div class="bg-atmos"></div>
  <div class="bg-mist"></div>
  <div class="bg-grain"></div>

  <nav class="nav fade fade-1">
    <a href="#" class="brand">SEDAT ONAT</a>
    <div class="right">
      <a href="mailto:info@sedatonat.com" data-en="contact" data-tr="iletişim">iletişim</a>
      <button class="menu-bullet" data-en="menu" data-tr="menü">menü</button>
    </div>
  </nav>

  <div class="center">
    <h1 class="title fade fade-2" data-en="Continuity<br>of Growth" data-tr="Gelişimin<br>Sürekliliği">Gelişimin<br>Sürekliliği</h1>
    <a href="#projeler" class="cta fade fade-3" data-en="My projects →" data-tr="Projelerim →"><span data-en="My projects" data-tr="Projelerim">Projelerim</span><span class="arr">→</span></a>
  </div>
</main>

<script>
  try {
    if (!(navigator.language || '').toLowerCase().startsWith('tr')) {
      document.documentElement.lang = 'en';
      document.querySelectorAll('[data-en]').forEach(el => {
        const text = el.getAttribute('data-en');
        if (text != null) el.innerHTML = text;
      });
    }
  } catch(e) {}
</script>
</body>
</html>
